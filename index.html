<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Drew Portfolio Model and Holdings</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="data/data.js"></script>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1529103214901256"
   crossorigin="anonymous"></script>
</head>
<body>
  <main class="container">
    <header>
      <div class="header-row">
        <h1>Drew Portfolio Model and Holdings</h1>
        <div class="sp-quote">S&amp;P <span id="spQuote">—</span></div>
      </div>
      <p id="meta">Loading data…</p>
    </header>

    <section class="card chart-card">
      <canvas id="chart" height="120"></canvas>
    </section>

    <section class="card score-card">
      <div class="score-label">Current Model Score</div>
      <div class="score-value" id="modelScore">—</div>
      <div class="score-key">
        <div class="key-item"><span class="key-dot green"></span>50–100% Bullish</div>
        <div class="key-item"><span class="key-dot yellow"></span>25–49% Neutral</div>
        <div class="key-item"><span class="key-dot red"></span>0–24% Bearish</div>
      </div>
    </section>

    <section class="card holdings-card">
      <div class="holdings-title">Portfolio Weights</div>
      <div class="holdings-row">
        <div class="holdings-list" id="holdingsList">—</div>
        <div class="ytd-card" id="ytdCard">
          <div class="ytd-label">YTD Return</div>
          <div class="ytd-value" id="ytdReturn">—</div>
        </div>
      </div>
    </section>

    <section class="card holdings-card">
      <div class="holdings-title">Index Returns</div>
      <div class="holdings-list" id="indexReturnsList">—</div>
    </section>

    <section class="card holdings-card">
      <div class="holdings-title">Daily Returns</div>
      <div class="daily-returns-row">
        <div class="holdings-list" id="dailyIndexReturnsList">—</div>
        <div class="daily-portfolio-box" id="dailyPortfolioBox">
          <div class="daily-portfolio-label">My Portfolio</div>
          <div class="daily-portfolio-value" id="dailyMyReturn">—</div>
        </div>
      </div>
    </section>

  </main>

  <script src="app.js"></script>
</body>
</html>
